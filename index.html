<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Knife Hit Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0f0f0f;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:#fff;
    text-align:center;
}
canvas{
    display:block;
}
.ui{
    position:absolute;
    top:10px;
    width:100%;
    font-size:20px;
    font-weight:bold;
}
.level{
    margin-top:5px;
    font-size:16px;
    color:#00ffcc;
}
.gameover{
    position:absolute;
    top:40%;
    width:100%;
    display:none;
}
button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    color:#000;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="ui">
    Score: <span id="score">0</span>
    <div class="level">Level: <span id="level">1</span></div>
</div>

<canvas id="game"></canvas>

<div class="gameover" id="gameOver">
    <h1>Game Over</h1>
    <button onclick="restart()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let centerX = canvas.width/2;
let centerY = canvas.height/2;
let radius = 110;

let rotation = 0;
let baseSpeed = 0.02;
let knives = [];
let score = 0;
let level = 1;
let gameOver = false;
let appleAngle = null;

// --------- SOUND ENGINE (LIGHTWEIGHT) ----------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = "square";
    gain.gain.value = 0.1;
    osc.start();
    setTimeout(()=>osc.stop(), duration);
}

// --------- DRAW WHEEL ----------
function drawWheel(){
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(rotation);

    let gradient = ctx.createRadialGradient(0,0,30,0,0,radius);
    gradient.addColorStop(0,"#6b3e26");
    gradient.addColorStop(1,"#3b1f12");

    ctx.beginPath();
    ctx.arc(0,0,radius,0,Math.PI*2);
    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.restore();
}

// --------- DRAW KNIVES ----------
function drawKnives(){
    knives.forEach(angle=>{
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle);
        ctx.fillStyle="#ddd";
        ctx.fillRect(-3,-radius-40,6,40);
        ctx.restore();
    });
}

// --------- DRAW APPLE ----------
function drawApple(){
    if(appleAngle === null) return;
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(appleAngle);
    ctx.beginPath();
    ctx.arc(0,-radius-15,10,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
    ctx.restore();
}

// --------- UPDATE ----------
function update(){
    if(gameOver) return;
    rotation += baseSpeed + (level * 0.002);
}

// --------- RENDER ----------
function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawWheel();
    drawKnives();
    drawApple();
}

// --------- LOOP ----------
function loop(){
    centerX = canvas.width/2;
    centerY = canvas.height/2;
    update();
    render();
    requestAnimationFrame(loop);
}
loop();

// --------- THROW KNIFE ----------
function throwKnife(){
    if(gameOver) return;

    if(audioCtx.state === "suspended") audioCtx.resume();

    let hitAngle = rotation % (Math.PI*2);

    for(let i=0;i<knives.length;i++){
        let diff = Math.abs(knives[i]-hitAngle);
        if(diff < 0.25){
            playSound(100,300);
            endGame();
            return;
        }
    }

    // Apple hit
    if(appleAngle !== null){
        if(Math.abs(appleAngle-hitAngle) < 0.25){
            score += 5;
            appleAngle = null;
            playSound(600,150);
        }
    }

    knives.push(hitAngle);
    score++;
    playSound(400,100);

    if(score % 10 === 0){
        level++;
        appleAngle = Math.random()*Math.PI*2;
    }

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

// --------- GAME OVER ----------
function endGame(){
    gameOver = true;
    document.getElementById("gameOver").style.display="block";
}

// --------- RESTART ----------
function restart(){
    knives = [];
    score = 0;
    level = 1;
    rotation = 0;
    appleAngle = null;
    gameOver = false;
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
    document.getElementById("gameOver").style.display="none";
}

// Touch + Click Support
window.addEventListener("click", throwKnife);
window.addEventListener("touchstart", throwKnife);
</script>

</body>
</html>
